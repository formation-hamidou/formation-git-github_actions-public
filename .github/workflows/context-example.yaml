name: Example workflow with multiple contexts

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod

jobs:
  # Job 1: Prepare
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Print github context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          


  # Job 2: build
  build:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print Job context
        run: |
          echo "Job Status: ${{ job.status }}"
      
      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

  # Job 3: Deploy
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print runner context
        run: |
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Architecture: ${{ runner.arch }}"
          echo "Runner Name: ${{ runner.name }}"
          echo "Runner Temporary Directory: ${{ runner.temp }}"

      - name: Use secret and variable
        run: |
          if [ "${{ github.event.inputs.environment }}" == "staging" ]; then
            echo "Deploying to staging environment"
            echo "BLOG_URL: ${{ vars.BLOG_URL }}"
          elif [ "${{ github.event.inputs.environment }}" == "prod" ]; then
            echo "Deploying to production environment"
            echo "PORTFOLIO_URL: ${{ vars.PORTFOLIO_URL }}"
            echo "USERNAME: ${{ secrets.USERNAME }}"
            echo "PASSWORD: ${{ secrets.PASSWORD }}"
          else
            echo "Unknown environment: ${{ github.event.inputs.environment }}"
          fi
      - name: Print Input variable
        run: |
          echo "Selected environment: ${{ github.event.inputs.environment }}"

      - name: Deploy to selected environment
        run: |
          echo "Deploying to ${{ github.ref }} on  ${{ github.event.inputs.environment }} environment"